pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,ts,svelte}"
      run: npx oxlint {staged_files}
    format:
      glob: "*.{js,ts,svelte,json,css,md}"
      run: npx oxfmt --write {staged_files}
      stage_fixed: true
    typecheck:
      run: npm run check

pre-push:
  commands:
    unit-tests:
      run: npm run test:unit
